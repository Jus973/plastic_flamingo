<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Flamboyance Playground</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="/">Home</a> / <a href="/shop/">Shop</a> / Cart
    </div>
    
    <h1>Shopping Cart</h1>
    <p>Review your items before checkout.</p>

    <div class="card">
      <div class="cart-item">
        <div>
          <strong>Widget Pro</strong>
          <div style="color: var(--text-muted); font-size: 0.875rem;">Qty: 1</div>
        </div>
        <div>
          <span style="font-weight: 600;">$49.99</span>
          <button type="button" class="btn btn-secondary" style="margin-left: 0.5rem; padding: 0.25rem 0.5rem;">Remove</button>
        </div>
      </div>
      
      <div class="cart-item">
        <div>
          <strong>Gadget Plus</strong>
          <div style="color: var(--text-muted); font-size: 0.875rem;">Qty: 2</div>
        </div>
        <div>
          <span style="font-weight: 600;">$159.98</span>
          <button type="button" class="btn btn-secondary" style="margin-left: 0.5rem; padding: 0.25rem 0.5rem;">Remove</button>
        </div>
      </div>
      
      <div style="padding: 1rem; border-top: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <strong style="font-size: 1.25rem;">Total: $209.97</strong>
      </div>
    </div>

    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <a href="/shop/" class="btn btn-secondary">Continue Shopping</a>
      <a href="/checkout/shipping/" class="btn btn-primary">Proceed to Checkout</a>
      <a href="/" class="btn btn-secondary">Back to Hub</a>
    </div>
  </div>
</body>
</html>
