<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping - Checkout - Flamboyance Playground</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="/">Home</a> / <a href="/shop/">Shop</a> / <a href="/cart/">Cart</a> / Checkout - Shipping
    </div>
    
    <h1>Shipping Information</h1>
    <p>Step 1 of 3: Enter your shipping address</p>

    <div class="card" style="max-width: 600px;">
      <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
        <div style="flex: 1; height: 4px; background: var(--primary); border-radius: 2px;"></div>
        <div style="flex: 1; height: 4px; background: var(--border); border-radius: 2px;"></div>
        <div style="flex: 1; height: 4px; background: var(--border); border-radius: 2px;"></div>
      </div>

      <form onsubmit="proceedToPayment(event)">
        <div class="form-group">
          <label for="full-name">Full Name *</label>
          <input type="text" id="full-name" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-group">
          <label for="address1">Address Line 1 *</label>
          <input type="text" id="address1" placeholder="Street address" required>
        </div>
        
        <div class="form-group">
          <label for="address2">Address Line 2</label>
          <input type="text" id="address2" placeholder="Apartment, suite, unit, etc. (optional)">
        </div>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" placeholder="City" required>
          </div>
          <div class="form-group">
            <label for="state">State *</label>
            <select id="state" required>
              <option value="">Select...</option>
              <option value="AL">Alabama</option>
              <option value="AK">Alaska</option>
              <option value="AZ">Arizona</option>
              <option value="CA">California</option>
              <option value="CO">Colorado</option>
              <option value="NY">New York</option>
              <option value="TX">Texas</option>
              <option value="WA">Washington</option>
            </select>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="zip">ZIP Code *</label>
            <input type="text" id="zip" placeholder="12345" required pattern="[0-9]{5}">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" placeholder="(555) 123-4567" required>
          </div>
        </div>

        <div class="form-group">
          <label for="shipping-method">Shipping Method *</label>
          <select id="shipping-method" required>
            <option value="">Select shipping speed...</option>
            <option value="standard">Standard (5-7 business days) - $9.99</option>
            <option value="express">Express (2-3 business days) - $19.99</option>
            <option value="overnight">Overnight (1 business day) - $34.99</option>
          </select>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox"> Save this address for future orders
          </label>
        </div>

        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.5rem;">
          <a href="/cart/" class="btn btn-secondary">Back to Cart</a>
          <button type="submit" class="btn btn-primary">Continue to Payment</button>
        </div>
      </form>
    </div>

    <div class="card" style="margin-top: 1rem;">
      <h3>Order Summary</h3>
      <div style="font-size: 0.875rem; color: var(--text-muted);">
        <div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">
          <span>Widget Pro × 1</span>
          <span>$49.99</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">
          <span>Gadget Plus × 2</span>
          <span>$159.98</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-top: 1px solid var(--border); margin-top: 0.5rem; font-weight: 600; color: var(--text);">
          <span>Subtotal</span>
          <span>$209.97</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function proceedToPayment(event) {
      event.preventDefault();
      window.location.href = '/checkout/payment/';
    }
  </script>
</body>
</html>
